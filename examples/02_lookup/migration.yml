version: 1

project:
  name: lookup_example
  description: Single-key lookup example

inputs:
  users:
    path: ./input/users.csv
    encoding: utf-8-sig
    delimiter: ","
    header: true
    schema:
      user_id:
        type: string
        required: true
        normalize: [trim]
      name:
        type: string
        required: true
        normalize: [trim]
      department_code:
        type: string
        required: true
        normalize: [trim]

references:
  departments:
    path: ./ref/departments.csv
    encoding: utf-8-sig
    delimiter: ","
    header: true
    key: department_code
    on_duplicate: error

outputs:
  users_out:
    path: ./output/users_out.csv
    encoding: utf-8-sig
    delimiter: ","
    header: true
    newline: "\n"
    if_exists: overwrite
    columns:
      - id
      - name
      - department_name

mappings:
  users_out:
    id:
      source: users.user_id
    name:
      source: users.name
    department_name:
      lookup:
        reference: departments
        key: users.department_code
        value: department_name
        on_missing: default
        default: Unknown

error_handling:
  on_validation_error: output_error
  on_lookup_missing: output_error
  on_transform_error: output_error
  max_errors: 1000
  error_output: ./reports/errors.csv
  skipped_output: ./reports/skipped.csv
  include_original_row: true

runtime:
  run_id: auto
  log_dir: ./logs
  log_level: INFO
  summary_output: ./reports/summary.json
