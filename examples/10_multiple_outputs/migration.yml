version: 1

project:
  name: multiple_outputs_demo

inputs:
  users:
    path: ./input_users.csv
    encoding: utf-8-sig
    delimiter: ","
    header: true
    schema:
      user_id:
        type: string
        required: true
        normalize: [trim]
      name:
        type: string
        required: true
        normalize: [trim]
      status:
        type: string
        required: true
        normalize: [trim]
      amount:
        type: decimal
        required: true
        normalize: [trim]
      department_code:
        type: string
        required: true
        normalize: [trim]

references:
  departments:
    path: ./ref_departments.csv
    encoding: utf-8-sig
    delimiter: ","
    header: true
    key: department_code
    on_duplicate: error

outputs:
  users_out:
    path: ./output/users_out.csv
    encoding: utf-8-sig
    delimiter: ","
    header: true
    newline: "\n"
    if_exists: error
    columns:
      - id
      - name
      - system_code
      - status
      - department_name
      - total_amount
  users_out_copy:
    path: ./output/users_out_copy.csv
    encoding: utf-8-sig
    delimiter: ","
    header: true
    newline: "\n"
    if_exists: error
    columns:
      - id
      - name
      - system_code
      - status
      - department_name
      - total_amount

mappings:
  users_out:
    id:
      source: users.user_id
    name:
      source: users.name
    system_code:
      value: CRM
    status:
      source: users.status
    department_name:
      lookup:
        reference: departments
        key: users.department_code
        value: department_name
        on_missing: default
        default: Unknown
    total_amount:
      expression: users.amount * 2
  users_out_copy:
    id:
      source: users.user_id
    name:
      source: users.name
    system_code:
      value: CRM
    status:
      source: users.status
    department_name:
      lookup:
        reference: departments
        key: users.department_code
        value: department_name
        on_missing: default
        default: Unknown
    total_amount:
      expression: users.amount * 2

validations:
  input:
    - field: users.user_id
      rule: required
  output:
    - output: users_out
      field: id
      rule: required
    - output: users_out
      field: total_amount
      rule: min
      value: 0
    - output: users_out_copy
      field: id
      rule: required
    - output: users_out_copy
      field: total_amount
      rule: min
      value: 0

error_handling:
  on_validation_error: output_error
  on_lookup_missing: output_error
  on_transform_error: output_error
  max_errors: 1000
  error_output: ./reports/errors.csv
  skipped_output: ./reports/skipped.csv
  include_original_row: true

runtime:
  run_id: auto
  log_dir: ./logs
  log_level: INFO
  summary_output: ./reports/summary.json
