version: 1
project:
  name: filters_bad_field
inputs:
  users:
    path: ./input_users_filters.csv
    schema:
      user_id:
        type: string
filters:
  exclude:
    - if: users.unknown == true
outputs:
  users_out:
    path: ./output/users.csv
    columns: [id]
mappings:
  users_out:
    id:
      source: users.user_id
error_handling:
  error_output: ./output/errors.csv
  skipped_output: ./output/skipped.csv
