version: 1
project:
  name: filters_include
inputs:
  users:
    path: ./input_users_filters.csv
    schema:
      user_id:
        type: string
      active:
        type: boolean
      amount:
        type: decimal
      price:
        type: decimal
      quantity:
        type: integer
      status:
        type: string
filters:
  include:
    - if: users.active == true
      reason: active users only
outputs:
  users_out:
    path: ./output/users.csv
    columns: [id]
mappings:
  users_out:
    id:
      source: users.user_id
error_handling:
  error_output: ./output/errors.csv
  skipped_output: ./output/skipped.csv
