version: 1

project:
  name: runner_test

inputs:
  users:
    path: ./input_users.csv
    encoding: utf-8
    delimiter: ","
    header: true
    schema:
      user_id:
        type: string
        required: true
      name:
        type: string
      status_code:
        type: string
      amount:
        type: decimal
      department_code:
        type: string

references:
  departments:
    path: ./ref_departments.csv
    encoding: utf-8
    delimiter: ","
    header: true
    key: department_code
    on_duplicate: error

outputs:
  users_out:
    path: ./output/users.csv
    columns:
      - id
      - name
      - system_code
      - status

mappings:
  users_out:
    id:
      source: users.user_id
    name:
      source: users.name
    system_code:
      value: CRM
    status:
      map:
        source: users.status_code
        values:
          A: active
          I: inactive
        default: unknown

error_handling:
  error_output: ./output/errors.csv
  skipped_output: ./output/skipped.csv
