version: 1
project:
  name: validation_bad_rule
inputs:
  users:
    path: ./input_users_validation_good.csv
    schema:
      user_id:
        type: string
outputs:
  users_out:
    path: ./output/users.csv
    columns: [id]
mappings:
  users_out:
    id:
      source: users.user_id
validations:
  output:
    - field: id
      rule: unsupported
error_handling:
  error_output: ./output/errors.csv
  skipped_output: ./output/skipped.csv
