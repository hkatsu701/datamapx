version: 1
project:
  name: validation_input_errors
inputs:
  users:
    path: ./input_users_validation_bad.csv
    schema:
      user_id:
        type: string
        required: true
      status:
        type: string
      amount:
        type: decimal
      code:
        type: string
      text:
        type: string
      short_text:
        type: string
      long_text:
        type: string
outputs:
  users_out:
    path: ./output/users.csv
    columns: [id, status, amount]
mappings:
  users_out:
    id:
      source: users.user_id
    status:
      source: users.status
    amount:
      source: users.amount
validations:
  input:
    - field: users.user_id
      rule: required
error_handling:
  error_output: ./output/errors.csv
  skipped_output: ./output/skipped.csv
