version: 1

project:
  name: unpivot_sample

input:
  path: ./input_payments_wide.csv
  encoding: utf-8-sig
  delimiter: ","
  header: true
  schema:
    customer_id:
      type: string
      required: true
      normalize: [trim]
    amount_2023:
      type: decimal
      required: false
      normalize: [trim, remove_commas]
    amount_2024:
      type: decimal
      required: false
      normalize: [trim, remove_commas]

unpivot:
  id_columns:
    - customer_id
  variable_column: year
  value_column: amount
  value_columns:
    amount_2023: "2023"
    amount_2024: "2024"
  drop_null_values: true

output:
  path: ./output/payments_long.csv
  encoding: utf-8-sig
  delimiter: ","
  header: true
  newline: "\n"
  if_exists: overwrite
  columns:
    - customer_id
    - year
    - amount

error_handling:
  on_validation_error: output_error
  on_lookup_missing: output_error
  on_transform_error: output_error
  max_errors: 1000
  error_output: ./reports/errors.csv
  skipped_output: ./reports/skipped.csv
  include_original_row: true

runtime:
  run_id: auto
  log_dir: ./logs
  log_level: INFO
  summary_output: ./reports/summary.json
