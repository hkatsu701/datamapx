version: 1

project:
  name: merge_sample
  description: Merge users and accounts into one staging CSV

inputs:
  users:
    path: ./input_users.csv
    encoding: utf-8-sig
    delimiter: ","
    header: true
    key: id
    schema:
      id:
        type: string
        required: true
        normalize: [trim]
      name:
        type: string
        required: false
        normalize: [trim]
      amount:
        type: decimal
        required: false
        normalize: [trim]

  accounts:
    path: ./input_accounts.csv
    encoding: utf-8-sig
    delimiter: ","
    header: true
    key: id
    schema:
      id:
        type: string
        required: true
        normalize: [trim]
      account_name:
        type: string
        required: false
        normalize: [trim]
      amount:
        type: decimal
        required: false
        normalize: [trim]
      department_name:
        type: string
        required: false
        normalize: [trim]

merge:
  base: users
  join_type: left
  columns:
    id:
      source: users.id
    primary_name:
      first:
        - users.name
        - accounts.account_name
    fallback_name:
      last:
        - users.name
        - accounts.account_name
    total_amount:
      sum:
        - users.amount
        - accounts.amount
    min_amount:
      min:
        - users.amount
        - accounts.amount
    max_amount:
      max:
        - users.amount
        - accounts.amount
    value_count:
      count:
        - users.amount
        - accounts.amount
    department_name:
      first:
        - accounts.department_name

output:
  path: ./output/merged.csv
  encoding: utf-8-sig
  delimiter: ","
  header: true
  newline: "\n"
  if_exists: overwrite
  columns:
    - id
    - primary_name
    - fallback_name
    - total_amount
    - min_amount
    - max_amount
    - value_count
    - department_name

error_handling:
  on_validation_error: output_error
  on_lookup_missing: output_error
  on_transform_error: output_error
  max_errors: 1000
  error_output: ./reports/errors.csv
  skipped_output: ./reports/skipped.csv
  include_original_row: true

runtime:
  run_id: auto
  log_dir: ./logs
  log_level: INFO
  summary_output: ./reports/summary.json
