version: 1

project:
  name: test_migration
  description: Minimal valid config for tests

inputs:
  users:
    path: ./input/users.csv
    encoding: utf-8-sig
    delimiter: ","
    header: true
    schema:
      user_id:
        type: string
        required: true
        normalize: [trim]
      department_code:
        type: string
        normalize: [trim]
      active:
        type: boolean
      price:
        type: decimal
        normalize: [trim, remove_commas, remove_currency_symbol]
      quantity:
        type: integer

references:
  departments:
    path: ./ref/departments.csv
    encoding: utf-8-sig
    delimiter: ","
    header: true
    key: department_code
    on_duplicate: error

filters:
  exclude:
    - if: users.user_id == ""
      reason: user_id is empty

derived:
  total_amount:
    expression: users.price * users.quantity

outputs:
  users_out:
    path: ./output/users_migrated.csv
    encoding: utf-8-sig
    delimiter: ","
    header: true
    newline: "\n"
    if_exists: error
    columns:
      - id
      - source_system
      - status
      - department_name
      - total_amount

mappings:
  users_out:
    id:
      source: users.user_id
    source_system:
      value: CRM
    status:
      when:
        - if: users.active == true
          then: active
      default: unknown
    department_name:
      lookup:
        reference: departments
        key: users.department_code
        value: department_name
        on_missing: error
    total_amount:
      source: derived.total_amount

validations:
  input:
    - field: users.user_id
      rule: required
  output:
    - field: id
      rule: required
    - field: status
      rule: enum
      values: [active, unknown]

checks:
  - name: row_count_check
    rule: input_rows == output_rows + error_rows + skipped_rows

error_handling:
  on_validation_error: output_error
  on_lookup_missing: output_error
  on_transform_error: output_error
  max_errors: 1000
  error_output: ./output/errors.csv
  skipped_output: ./output/skipped.csv
  include_original_row: true

runtime:
  run_id: auto
  log_dir: ./logs
  log_level: INFO
