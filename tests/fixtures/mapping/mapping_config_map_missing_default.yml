version: 1

project:
  name: mapping_missing_default

inputs:
  users:
    path: ./input_users.csv
    schema:
      user_id:
        type: string
        required: true
      status_code:
        type: string

outputs:
  users_out:
    path: ./output/users.csv
    columns:
      - id
      - status

mappings:
  users_out:
    id:
      source: users.user_id
    status:
      map:
        source: users.status_code
        values:
          A: active
          I: inactive

error_handling:
  error_output: ./output/errors.csv
  skipped_output: ./output/skipped.csv
