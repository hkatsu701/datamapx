version: 1
project:
  name: derived_unknown
inputs:
  users:
    path: ./input_users_derived.csv
    schema:
      user_id:
        type: string
derived:
  known:
    source: users.user_id
outputs:
  users_out:
    path: ./output/users.csv
    columns: [id]
mappings:
  users_out:
    id:
      source: derived.unknown_field
error_handling:
  error_output: ./output/errors.csv
  skipped_output: ./output/skipped.csv
