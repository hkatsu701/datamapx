version: 1
project:
  name: derived_cycle
inputs:
  users:
    path: ./input_users_derived.csv
    schema:
      user_id:
        type: string
      price:
        type: decimal
derived:
  a:
    expression: derived.b + 1
  b:
    expression: derived.a + 1
outputs:
  users_out:
    path: ./output/users.csv
    columns: [id, result]
mappings:
  users_out:
    id:
      source: users.user_id
    result:
      source: derived.a
error_handling:
  error_output: ./output/errors.csv
  skipped_output: ./output/skipped.csv
