version: 1
project:
  name: expression_bad_function
inputs:
  users:
    path: ./input_users_expression.csv
    schema:
      user_id:
        type: string
      price:
        type: decimal
outputs:
  users_out:
    path: ./output/users.csv
    columns: [id, result]
mappings:
  users_out:
    id:
      source: users.user_id
    result:
      expression: sqrt(users.price)
error_handling:
  error_output: ./output/errors.csv
  skipped_output: ./output/skipped.csv
