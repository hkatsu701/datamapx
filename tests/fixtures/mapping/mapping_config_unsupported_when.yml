version: 1
project:
  name: mapping_when
inputs:
  users:
    path: ./input_users.csv
    schema:
      user_id:
        type: string
      status_code:
        type: string
outputs:
  users_out:
    path: ./output/users.csv
    columns: [id, status]
mappings:
  users_out:
    id:
      source: users.user_id
    status:
      when:
        - if: users.status_code == "A"
          then: active
      default: unknown
error_handling:
  error_output: ./output/errors.csv
  skipped_output: ./output/skipped.csv
